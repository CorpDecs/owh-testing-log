<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWH Testing Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; background: #f5f5f3; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 2rem; color: #1a1a1a; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 2rem; }
  .stat { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.75rem 1rem; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 500; }

  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .card-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }

  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; color: #666; font-weight: 500; }
  select, textarea, input[type=text] {
    font-family: inherit; font-size: 14px; color: #1a1a1a;
    background: #fafafa; border: 0.5px solid #ccc; border-radius: 8px;
    padding: 8px 10px; width: 100%;
  }
  select:focus, textarea:focus, input:focus { outline: none; border-color: #888; background: #fff; }
  textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

  .form-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  button {
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    border: 0.5px solid #ccc; background: transparent; color: #1a1a1a;
    transition: background 0.1s;
  }
  button:hover { background: #f0f0ee; }
  button.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
  button.primary:hover { background: #333; }
  button.danger { color: #a32d2d; border-color: #f0c0c0; }
  button.danger:hover { background: #fdf0f0; }
  .save-msg { font-size: 12px; color: #3b6d11; opacity: 0; transition: opacity 0.3s; }
  .save-msg.show { opacity: 1; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .filters select { width: auto; min-width: 140px; font-size: 13px; padding: 6px 10px; }
  .filters input { flex: 1; min-width: 160px; font-size: 13px; padding: 6px 10px; }

  .section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .log-list { display: flex; flex-direction: column; gap: 10px; }

  .entry { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; }
  .entry:hover { border-color: #bbb; }
  .entry-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .entry-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px; display: inline-block; white-space: nowrap; }
  .badge-observation { background: #e6f1fb; color: #0c447c; }
